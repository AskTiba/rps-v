<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32x32.png">
  <title>Rock, Paper, Scissors</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
  <div class="game" role="main">
    <header class="scoreboard">
      <div class="scoreboard__left">
        <div class="scoreboard__logo" aria-label="Rock Paper Scissors" id="logo-container">
          <img src="assets/images/logo.svg" alt="" id="logo-img">
        </div>
        <button class="btn btn--mode" id="mode-toggle">BONUS</button>
      </div>
      <div class="scoreboard__score">
        <span class="scoreboard__label">Score</span>
        <span class="scoreboard__value" id="score">0</span>
      </div>
    </header>

    <section class="game-board" id="game-board" aria-label="Game board">
      <div class="choices" id="choices" role="group" aria-label="Choose your move"></div>
      <div class="reveal hidden" id="reveal">
        <div class="reveal__column">
          <div class="reveal__choice" id="user-choice"></div>
          <p class="reveal__label">You Picked</p>
        </div>
        <div class="reveal__column">
          <div class="reveal__choice" id="house-choice"></div>
          <p class="reveal__label">The House Picked</p>
        </div>
        <div class="reveal__result" id="result-display">
          <p class="reveal__result-text" id="result-text"></p>
          <button class="btn btn--play-again" id="play-again">Play Again</button>
        </div>
      </div>
    </section>
  </div>

  <button class="btn btn--rules" id="rules-btn">Rules</button>

  <div class="overlay hidden" id="rules-overlay" role="dialog" aria-modal="true" aria-labelledby="rules-title">
    <div class="modal">
      <div class="modal__header">
        <h2 class="modal__title" id="rules-title">Rules</h2>
        <button class="modal__close" id="rules-close" aria-label="Close rules">
          <img src="assets/images/icon-close.svg" alt="">
        </button>
      </div>
      <div class="modal__content">
        <img src="assets/images/image-rules.svg" alt="Game rules" id="rules-image">
      </div>
    </div>
  </div>

  <script type="module" src="src/js/app.js"></script>
</body>
</html>
